<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>SWD</title>
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SWD">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--panel:#131319;--line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.16);--text:#f5f3ee;--soft:#d7d3ca;--muted:#a6a299;--accent:#ff5a2c;--accent2:#ff2e7e;--blue:#5aa9ff;--green:#36d17a;--amber:#ffb030;--gold:#ffd25a;--gray:#8a8a93}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Manrope,system-ui,sans-serif;background:var(--bg);color:var(--soft);-webkit-font-smoothing:antialiased;line-height:1.5;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
h1,h2,h3{font-family:Sora,sans-serif;color:#fff;letter-spacing:-.02em;line-height:1.1}
.wrap{max-width:760px;margin:0 auto;padding:18px 16px 56px}
#lock{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(120% 90% at 70% 0%,#1a0f12,#0a0a0c 60%);z-index:50;padding:24px}
.lockcard{width:100%;max-width:330px;text-align:center}
.mark{width:64px;height:64px;border-radius:19px;margin:0 auto 22px;background:linear-gradient(140deg,#ff7a3c,#ff2e7e);display:grid;place-items:center;font-family:Sora;font-weight:800;font-size:1.15rem;color:#0a0a0c;box-shadow:0 12px 34px -10px rgba(255,90,44,.7)}
.lockcard h1{font-size:1.5rem;margin-bottom:6px}
.lockcard p{color:var(--muted);font-size:.9rem;margin-bottom:22px}
#faceid{width:100%;margin-bottom:14px;padding:14px;border:1.5px solid var(--accent);border-radius:14px;background:rgba(255,90,44,.14);color:#fff;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;display:none;align-items:center;justify-content:center;gap:9px}
#faceid svg{width:22px;height:22px}
#pin{width:100%;text-align:center;font-family:Sora;font-size:1.12rem;letter-spacing:.01em;padding:16px;border-radius:14px;border:1.5px solid var(--line2);background:#0e0e12;color:#fff;outline:none}
.reveal{margin-top:10px;background:none;border:0;color:var(--muted);font-size:.8rem;text-decoration:underline;cursor:pointer;font-family:inherit}
#pin:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,90,44,.16)}
#unlock{width:100%;margin-top:14px;padding:15px;border:0;border-radius:14px;font-family:Manrope;font-weight:700;font-size:1rem;color:#180a04;background:var(--accent);cursor:pointer}
#err{color:#ff6b6b;font-size:.85rem;height:1.1em;margin-top:12px}
#app{display:none}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.top .brand{display:flex;align-items:center;gap:10px}
.top .brand .m{width:34px;height:34px;border-radius:10px;background:linear-gradient(140deg,#ff7a3c,#ff2e7e);display:grid;place-items:center;font-family:Sora;font-weight:800;font-size:.62rem;color:#0a0a0c}
.top h1{font-size:1.18rem}
.headbtns{display:flex;gap:7px}
.hbtn{background:none;border:1px solid var(--line2);color:var(--muted);border-radius:10px;padding:7px 11px;font-size:.76rem;cursor:pointer;font-family:inherit}
.updated{color:var(--muted);font-size:.76rem;margin-bottom:16px}
.cmds{background:linear-gradient(160deg,rgba(255,90,44,.10),var(--panel));border:1px solid rgba(255,90,44,.32);border-radius:15px;padding:14px 15px;margin-bottom:18px}
.cmds h3{font-size:.96rem;margin-bottom:11px;color:#fff}
.cmdgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cmdbtn{border:1px solid var(--line2);background:#15151b;color:#fff;border-radius:11px;padding:12px 11px;font-family:inherit;font-weight:600;font-size:.85rem;cursor:pointer;text-align:left;line-height:1.2}
.cmdbtn:active{transform:scale(.98)}
.cmdcustom{display:flex;gap:8px;margin-top:9px}
.cmdcustom input{flex:1;min-width:0;padding:11px 12px;border-radius:11px;border:1.5px solid var(--line2);background:#0e0e12;color:#fff;font-family:inherit;font-size:.88rem;outline:none}
.cmdcustom input:focus{border-color:var(--accent)}
.cmdcustom button{flex:none;border:0;border-radius:11px;padding:0 16px;background:var(--accent);color:#180a04;font-weight:700;font-family:inherit;cursor:pointer}
.cmdhint{color:var(--muted);font-size:.74rem;margin-top:9px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
.card .n{font-family:Sora;font-weight:800;font-size:1.5rem;color:#fff;line-height:1}
.card .l{color:var(--muted);font-size:.72rem;margin-top:4px}
.card.hl{border-color:rgba(255,176,48,.5);background:linear-gradient(160deg,rgba(255,176,48,.12),var(--panel))}
.card.hl .n{color:var(--amber)}
.due{background:linear-gradient(160deg,rgba(255,46,126,.14),var(--panel));border:1px solid rgba(255,46,126,.4);border-radius:14px;padding:13px 15px;margin-bottom:16px}
.due h3{font-size:.95rem;margin-bottom:8px;color:#fff}
.due ul{list-style:none}.due li{display:flex;justify-content:space-between;gap:10px;font-size:.85rem;padding:4px 0;border-top:1px solid var(--line)}
.due li:first-child{border-top:0}.due .od{color:#ff8a5a;font-weight:700}
.tools{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
#q{flex:1;min-width:140px;padding:11px 13px;border-radius:11px;border:1.5px solid var(--line2);background:#0e0e12;color:#fff;font-family:inherit;font-size:.9rem;outline:none}
#q:focus{border-color:var(--accent)}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.chip{flex:none;border:1px solid var(--line2);background:var(--panel);color:var(--soft);border-radius:100px;padding:7px 13px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:#fff;color:#0a0a0c;border-color:#fff}
.lead{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:15px 16px;margin-bottom:11px}
.lead .h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.lead h3{font-size:1.04rem;margin-bottom:3px}
.lead .sub{color:var(--muted);font-size:.78rem}
.pill{flex:none;font-size:.68rem;font-weight:700;padding:4px 9px;border-radius:100px;white-space:nowrap;font-family:Manrope;text-transform:uppercase;letter-spacing:.03em}
.p-sent{background:rgba(90,169,255,.16);color:var(--blue)}
.p-ready{background:rgba(255,176,48,.16);color:var(--amber)}
.p-replied{background:rgba(54,209,122,.18);color:var(--green)}
.p-won{background:rgba(255,210,90,.18);color:var(--gold)}
.p-declined{background:rgba(255,255,255,.08);color:var(--gray)}
.p-lead{background:rgba(255,255,255,.08);color:var(--soft)}
.p-other{background:rgba(255,255,255,.08);color:var(--soft)}
.meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:11px;font-size:.8rem;color:var(--soft)}
.meta b{color:var(--muted);font-weight:600}
.lead .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.lead .actions a{font-size:.8rem;font-weight:600;text-decoration:none;padding:8px 12px;border-radius:10px;border:1px solid var(--line2);color:#fff}
.lead .actions a.prim{background:var(--accent);color:#180a04;border-color:transparent}
.note{margin-top:10px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--line);padding-top:9px}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem}
.foot{text-align:center;color:#5b5751;font-size:.72rem;margin-top:22px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#fff;color:#0a0a0c;font-weight:700;font-size:.85rem;padding:11px 18px;border-radius:100px;opacity:0;transition:.25s;z-index:80;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.45);max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="lock">
  <div class="lockcard">
    <div class="mark">swd</div>
    <h1>SWD Pipeline</h1>
    <p id="locksub">Voer je toegangscode in</p>
    <button id="faceid" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"/><path d="M9 10v1M15 10v1M12 9v4l-1 1M9.5 15.5c1.5 1 3.5 1 5 0"/></svg> Face ID gebruiken</button>
    <form id="lockform">
      <input id="pin" type="password" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" maxlength="80" placeholder="Toegangscode" aria-label="Toegangscode">
      <button type="button" id="reveal" class="reveal">Toon</button>
      <button id="unlock" type="submit">Ontgrendelen</button>
    </form>
    <div id="err"></div>
  </div>
</div>
<div id="app"><div class="wrap" id="root"></div></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  var ENC=JSON.parse(document.getElementById('enc').textContent);
  var KEY='swd_dash_pin', BC='swd_bio_cred', BP='swd_bio_pin';
  var state={data:null,filter:'all',q:'',pin:null};
  var $=function(id){return document.getElementById(id);};
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var b2u=function(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;};
  var rnd=function(n){var a=new Uint8Array(n);crypto.getRandomValues(a);return a;};
  var toast=function(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);};

  async function decrypt(pin){
    pin=(pin||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    var e=new TextEncoder();
    var bk=await crypto.subtle.importKey('raw',e.encode(pin),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(ENC.iv)},key,b2u(ENC.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  }
  var bioOn=function(){return !!localStorage.getItem(BC);};
  var canBio=function(){return !!(window.PublicKeyCredential&&navigator.credentials);};
  async function bioEnable(pin){
    var cred=await navigator.credentials.create({publicKey:{
      rp:{name:'SWD',id:location.hostname},
      user:{id:rnd(16),name:'swd-pipeline',displayName:'SWD Pipeline'},
      challenge:rnd(32),
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000,attestation:'none'
    }});
    var id=btoa(String.fromCharCode.apply(null,new Uint8Array(cred.rawId)));
    localStorage.setItem(BC,id); localStorage.setItem(BP,btoa(pin)); localStorage.removeItem(KEY);
  }
  async function bioUnlock(){
    var id=localStorage.getItem(BC); if(!id) throw new Error('none');
    await navigator.credentials.get({publicKey:{challenge:rnd(32),rpId:location.hostname,allowCredentials:[{type:'public-key',id:b2u(id)}],userVerification:'required',timeout:60000}});
    return atob(localStorage.getItem(BP));
  }

  function sendCmd(text){
    if(!text)return;
    var c=(state.data&&state.data.cmd)||{};
    var body='token: '+(c.token||'')+' - verstuur dit bericht om de opdracht aan Claude te geven.';
    var url='mailto:'+(c.inbox||'')+'?subject='+encodeURIComponent('[SWD-CMD] '+text)+'&body='+encodeURIComponent(body);
    location.href=url;
  }
  var PRESETS=[
    {l:'Dagelijkse run',c:'/swd'},
    {l:'Dagelijkse batch (10)',c:'/swd-batch 10'},
    {l:'Antwoorden checken',c:'/swd-replies'},
    {l:'Wachtrij versturen',c:'Verstuur de previews die in de wachtrij staan (max 5 vandaag)'},
    {l:'Dashboard verversen',c:'Werk het SWD-dashboard bij'}
  ];

  function fmtDate(iso){try{return new Date(iso).toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return iso;}}

  function render(){
    var d=state.data,s=d.stats,root=$('root');
    var cats=[['all','Alles',s.total],['sent','Verstuurd',s.sent],['ready','Wachtrij',s.ready],['replied','Reactie',s.replied],['lead','Te benaderen',s.lead],['won','Klant',s.won],['declined','Geen int.',s.declined]];
    var h='';
    h+='<div class="top"><div class="brand"><div class="m">swd</div><h1>Pipeline</h1></div><div class="headbtns">';
    /* Face ID disabled: WebAuthn is unreliable on github.io (public-suffix host) */
    h+='<button class="hbtn" id="lock-btn">Vergrendel</button></div></div>';
    h+='<div class="updated">Laatst bijgewerkt: '+esc(fmtDate(d.generatedAt))+'</div>';
    // command panel
    h+='<div class="cmds"><h3>Stuur een opdracht naar Claude</h3><div class="cmdgrid">';
    PRESETS.forEach(function(p,i){h+='<button class="cmdbtn" data-cmd="'+esc(p.c)+'">'+esc(p.l)+'</button>';});
    h+='</div><div class="cmdcustom"><input id="cmdq" placeholder="Eigen opdracht…" autocomplete="off"><button id="cmdsend" type="button">Stuur</button></div>';
    h+='<p class="cmdhint">Tik: je e-mail opent met de opdracht erin — verstuur het. Claude pikt het op bij de volgende controle.</p></div>';
    // stats
    h+='<div class="grid">';
    h+='<div class="card"><div class="n">'+s.total+'</div><div class="l">Leads totaal</div></div>';
    h+='<div class="card"><div class="n">'+s.sent+'</div><div class="l">Verstuurd</div></div>';
    h+='<div class="card"><div class="n">'+s.replied+'</div><div class="l">Reacties</div></div>';
    h+='<div class="card"><div class="n">'+s.built+'</div><div class="l">Previews live</div></div>';
    h+='<div class="card"><div class="n">'+s.ready+'</div><div class="l">In wachtrij</div></div>';
    h+='<div class="card'+(s.dueNow?' hl':'')+'"><div class="n">'+s.dueNow+'</div><div class="l">Opvolging nu</div></div>';
    h+='</div>';
    if(d.followups&&d.followups.length){
      h+='<div class="due"><h3>Opvolgingen</h3><ul>';
      d.followups.forEach(function(f){h+='<li><span>'+esc(f.name)+' · '+esc(f.label)+'</span><span class="'+(f.due?'od':'')+'">'+esc(f.date)+(f.due?' • nu':'')+'</span></li>';});
      h+='</ul></div>';
    }
    h+='<div class="tools"><input id="q" placeholder="Zoek bedrijf, plaats, e-mail…" value="'+esc(state.q)+'"></div>';
    h+='<div class="chips">';
    cats.forEach(function(c){h+='<button class="chip'+(state.filter===c[0]?' on':'')+'" data-f="'+c[0]+'">'+c[1]+' '+c[2]+'</button>';});
    h+='</div>';
    var list=d.leads.filter(function(l){
      if(state.filter!=='all'&&l.cat!==state.filter)return false;
      if(state.q){var t=(l.name+' '+l.city+' '+l.email+' '+l.niche+' '+l.owner+' '+l.notes).toLowerCase();return t.indexOf(state.q.toLowerCase())>=0;}
      return true;
    });
    if(!list.length)h+='<div class="empty">Geen resultaten.</div>';
    list.forEach(function(l){
      h+='<div class="lead"><div class="h"><div><h3>'+esc(l.name)+'</h3><div class="sub">'+esc([l.niche,l.city].filter(Boolean).join(' · '))+(l.owner?(' · '+esc(l.owner)):'')+'</div></div><span class="pill p-'+l.cat+'">'+esc(l.catLabel)+'</span></div>';
      var m=[];
      if(l.email)m.push('<span><b>E-mail</b> '+esc(l.email)+'</span>');
      if(l.sentDate)m.push('<span><b>Verstuurd</b> '+esc(l.sentDate)+'</span>');
      if(l.cat==='sent'&&(l.fu1||l.fu2))m.push('<span><b>Opvolgen</b> '+esc([l.fu1,l.fu2].filter(Boolean).join(' / '))+'</span>');
      if(!l.sentDate&&l.status)m.push('<span><b>Status</b> '+esc(l.status)+'</span>');
      if(m.length)h+='<div class="meta">'+m.join('')+'</div>';
      h+='<div class="actions">';
      if(l.link)h+='<a class="prim" href="'+esc(l.link)+'" target="_blank" rel="noopener">Bekijk preview</a>';
      if(l.email)h+='<a href="mailto:'+esc(l.email)+'">E-mail</a>';
      h+='</div>';
      if(l.notes)h+='<div class="note">'+esc(l.notes)+'</div>';
      h+='</div>';
    });
    h+='<div class="foot">SWD Pipeline · privé · '+s.sentFiles+' verzonden · '+s.queuedFiles+' in wachtrij</div>';
    root.innerHTML=h;
    // wire
    var lb=$('lock-btn'); if(lb)lb.onclick=function(){localStorage.removeItem(KEY);location.href=location.pathname;};
    var eb=$('enablebio'); if(eb)eb.onclick=async function(){try{await bioEnable(state.pin);toast('Face ID ingesteld');render();}catch(e){toast('Face ID instellen mislukt');}};
    Array.prototype.forEach.call(document.querySelectorAll('.cmdbtn'),function(b){b.onclick=function(){sendCmd(b.getAttribute('data-cmd'));};});
    var cs=$('cmdsend'),cq=$('cmdq'); if(cs)cs.onclick=function(){sendCmd(cq.value.trim());cq.value='';};
    if(cq)cq.addEventListener('keydown',function(e){if(e.key==='Enter'){sendCmd(cq.value.trim());cq.value='';}});
    var q=$('q'); if(q)q.oninput=function(){state.q=q.value;var pos=q.selectionStart;render();var nq=$('q');nq.focus();try{nq.setSelectionRange(pos,pos);}catch(e){}};
    Array.prototype.forEach.call(document.querySelectorAll('.chip'),function(c){c.onclick=function(){state.filter=c.getAttribute('data-f');render();};});
  }

  async function showApp(pin){state.pin=pin;state.data=await decrypt(pin);$('lock').style.display='none';$('app').style.display='block';render();}
  async function tryPin(pin,silent){
    try{await showApp(pin);localStorage.setItem(KEY,pin);}
    catch(e){if(!silent){$('err').textContent='Onjuiste toegangscode';var p=$('pin');p.value='';p.focus();}}
  }
  async function doFace(){
    try{$('err').textContent='';var pin=await bioUnlock();await showApp(pin);}
    catch(e){$('err').textContent='Face ID mislukt — gebruik je toegangscode';$('pin').focus();}
  }

  // form + face id buttons
  $('lockform').addEventListener('submit',function(e){e.preventDefault();var v=$('pin').value.trim();if(v)tryPin(v,false);});
  $('faceid').addEventListener('click',doFace);

  // boot
  var urlKey=(new URLSearchParams(location.search)).get('k');
  if(urlKey){tryPin(urlKey,true);}   // magic-link one-tap (backup)
  else{var saved=localStorage.getItem(KEY);if(saved){tryPin(saved,true);}else{$('pin').focus();}}  // stay logged in across refreshes until Vergrendel
  $('reveal').addEventListener('click',function(){var p=$('pin');if(p.type==='password'){p.type='text';this.textContent='Verberg';}else{p.type='password';this.textContent='Toon';}});
})();
</script>
</body>
</html>
